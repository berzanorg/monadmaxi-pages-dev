<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#DDD7FE" stop-opacity="1"/>
      <stop offset="18%"  stop-color="#DDD7FE" stop-opacity="0.85"/>
      <stop offset="42%"  stop-color="#A98DFF" stop-opacity="0.55"/>
      <stop offset="72%"  stop-color="#6E54FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6E54FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6E54FF" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#DDD7FE" stop-opacity="0.95"/>
      <stop offset="52%"  stop-color="#DDD7FE" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#6E54FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0c0a1e"/>

  <!-- streak across both eyes -->
  <rect x="2" y="30" width="60" height="3" fill="url(#streak)"/>

  <!-- left eye -->
  <circle cx="22" cy="31.5" r="13" fill="url(#halo)"/>
  <circle cx="22" cy="31.5" r="3.2" fill="#ffffff"/>

  <!-- right eye -->
  <circle cx="42" cy="31.5" r="13" fill="url(#halo)"/>
  <circle cx="42" cy="31.5" r="3.2" fill="#ffffff"/>
</svg>
